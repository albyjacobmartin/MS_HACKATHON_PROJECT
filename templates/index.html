<!DOCTYPE html>
<html>

<head>
    <title>Team : LSTM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-7xl mx-auto">

        <!-- HERO -->

        <div class="text-center mb-10">

            <h1 class="text-5xl font-bold text-blue-600">
                Team : LSTM
            </h1>

            <p class="text-gray-600 text-lg mt-4">
                Microsoft AI for Good Hackathon
            </p>

        </div>

        <div class="grid md:grid-cols-2 gap-8">

            <!-- LEFT PANEL -->

            <div class="bg-white rounded-xl shadow p-6">

                <h2 class="text-2xl font-bold mb-6">
                    Upload Resume
                </h2>

                <input
                    type="file"
                    id="resume"
                    class="mb-4 block w-full"
                >

                <select
                    id="role"
                    class="border p-3 rounded w-full mb-4"
                >
                    <option>AI Engineer</option>
                    <option>Data Scientist</option>
                    <option>Full Stack Developer</option>
                    <option>Cloud Engineer</option>
                </select>

                <button
                    onclick="analyzeResume()"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 w-full"
                >
                    Analyze Resume
                </button>

            </div>

            <!-- RIGHT PANEL -->

            <div
                id="results"
                class="bg-white rounded-xl shadow p-6"
            >

                <div class="text-center text-gray-500">

                    <h2 class="text-2xl font-bold mb-4">
                        Ready for Analysis
                    </h2>

                    <p>
                        Upload a resume and choose a target role.
                    </p>

                </div>

            </div>

        </div>

    </div>

<script>

async function analyzeResume() {

    const fileInput =
        document.getElementById("resume")

    const role =
        document.getElementById("role").value

    const file =
        fileInput.files[0]

    if (!file) {
        alert("Please upload a resume")
        return
    }

    document.getElementById("results").innerHTML = `
        <div class="text-center">
            <h2 class="text-2xl font-bold">
                Analyzing Resume...
            </h2>
            <p class="mt-3">
                AI is extracting skills and generating recommendations.
            </p>
        </div>
    `

    const formData = new FormData()

    formData.append("file", file)
    formData.append("target_role", role)

    const response = await fetch(
        "/analyze",
        {
            method: "POST",
            body: formData
        }
    )

    const data = await response.json()

    renderResults(data)
}

function renderResults(data) {

    document.getElementById("results").innerHTML = `

        <h2 class="text-3xl font-bold mb-6">
            ${data.target_role}
        </h2>

        <!-- SCORE CARDS -->

        <div class="grid grid-cols-2 gap-4 mb-6">

            <div class="bg-green-100 p-4 rounded-xl">

                <h3 class="font-bold">
                    Current Readiness
                </h3>

                <p class="text-4xl font-bold text-green-600">
                    ${data.gap_analysis.score}%
                </p>

            </div>

            <div class="bg-blue-100 p-4 rounded-xl">

                <h3 class="font-bold">
                    Potential Readiness
                </h3>

                <p class="text-4xl font-bold text-blue-600">
                    100%
                </p>

            </div>

        </div>

        <!-- PROGRESS BAR -->

        <div class="mb-6">

            <div class="w-full bg-gray-200 rounded-full h-8">

                <div
                    class="bg-green-500 h-8 rounded-full text-white text-center"
                    style="width:${data.gap_analysis.score}%"
                >
                    ${data.gap_analysis.score}%
                </div>

            </div>

        </div>

        <!-- SKILLS -->

        <div class="mb-6">

            <h3 class="font-bold text-lg mb-2">
                Skills Detected
            </h3>

            ${data.student_skills.map(skill => `
                <span class="inline-block bg-blue-100 px-3 py-1 rounded-full mr-2 mb-2">
                    ${skill}
                </span>
            `).join("")}

        </div>

        <!-- GAPS -->

        <div class="mb-6">

            <h3 class="font-bold text-lg mb-2">
                Skill Gaps
            </h3>

            ${data.gap_analysis.missing.map(skill => `
                <span class="inline-block bg-red-100 px-3 py-1 rounded-full mr-2 mb-2">
                    ${skill}
                </span>
            `).join("")}

        </div>

        <!-- MATCHED -->

        <div class="mb-6">

            <h3 class="font-bold text-lg mb-2">
                Matching Skills
            </h3>

            ${data.gap_analysis.matched.map(skill => `
                <span class="inline-block bg-green-100 px-3 py-1 rounded-full mr-2 mb-2">
                    ${skill}
                </span>
            `).join("")}

        </div>

        <!-- ROADMAP -->

        <div>

            <h3 class="font-bold text-lg mb-3">
                Personalized Career Roadmap
            </h3>

            <div class="bg-gray-50 p-4 rounded-lg">

                <pre class="whitespace-pre-wrap text-sm font-sans">
${data.roadmap}
                </pre>

            </div>

        </div>

    `
}

</script>

</body>
</html>
